version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: licensing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

volumes:
  pgdata:
