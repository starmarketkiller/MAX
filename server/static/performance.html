<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus EA — Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;} html,body{margin:0;} ::selection{background:rgba(61,220,151,.3);}</style>
</head>
<body style="min-height:100vh;background:#080B11;font-family:'IBM Plex Sans',sans-serif;color:#EAF0F8;">
<div style="background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:48px 48px;">
<div id="main-nav"></div>

<!-- HERO -->
<div style="max-width:1200px;margin:0 auto;padding:64px 40px 24px;">
  <div style="display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;color:#3DDC97;border:1px solid rgba(61,220,151,.3);padding:7px 14px;border-radius:30px;margin-bottom:24px;">// PERFORMANCE</div>
  <h1 id="h1" style="font-family:'Sora',sans-serif;font-size:48px;line-height:1.07;font-weight:800;letter-spacing:-0.025em;margin:0 0 16px;max-width:760px;"></h1>
  <p id="sub" style="font-size:17.5px;line-height:1.6;color:#9aa6b8;max-width:620px;margin:0;"></p>
</div>

<!-- DISCLAIMER -->
<div style="max-width:1200px;margin:0 auto;padding:20px 40px 0;">
  <div style="display:flex;gap:12px;align-items:flex-start;background:rgba(217,154,78,.06);border:1px solid rgba(217,154,78,.22);border-radius:12px;padding:16px 18px;">
    <span style="color:#d99a4e;font-size:15px;">⚠</span>
    <p id="disclaimer" style="margin:0;font-size:13.5px;line-height:1.6;color:#c7a978;"></p>
  </div>
</div>

<!-- EQUITY CHART -->
<div style="max-width:1200px;margin:0 auto;padding:32px 40px;">
  <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:30px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <div style="font-family:'Sora',sans-serif;font-weight:600;font-size:18px;" id="chart-title"></div>
      <div style="display:flex;gap:18px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#7c8aa3;">
        <span><span style="color:#4F8CFF;">●</span> Equity</span>
        <span><span style="color:#3DDC97;">●</span> <span id="leg-net"></span></span>
      </div>
    </div>
    <svg viewBox="0 0 1100 320" style="width:100%;height:300px;display:block;">
      <defs>
        <linearGradient id="eg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4F8CFF" stop-opacity="0.25"/><stop offset="1" stop-color="#4F8CFF" stop-opacity="0"/></linearGradient>
        <linearGradient id="el" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#4F8CFF"/><stop offset="1" stop-color="#3DDC97"/></linearGradient>
      </defs>
      <line x1="0" y1="80" x2="1100" y2="80" stroke="rgba(255,255,255,.05)"/>
      <line x1="0" y1="160" x2="1100" y2="160" stroke="rgba(255,255,255,.05)"/>
      <line x1="0" y1="240" x2="1100" y2="240" stroke="rgba(255,255,255,.05)"/>
      <path d="M0,300 L70,290 L140,294 L210,270 L280,278 L350,250 L420,260 L490,228 L560,238 L630,205 L700,214 L770,176 L840,188 L910,150 L980,120 L1040,98 L1100,70 L1100,320 L0,320 Z" fill="url(#eg)"/>
      <path d="M0,300 L70,290 L140,294 L210,270 L280,278 L350,250 L420,260 L490,228 L560,238 L630,205 L700,214 L770,176 L840,188 L910,150 L980,120 L1040,98 L1100,70" fill="none" stroke="url(#el)" stroke-width="2.5"/>
    </svg>
    <div style="display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;color:#5b6472;margin-top:8px;">
      <span>2023</span><span>2024</span><span>2025</span><span>2026</span>
    </div>
  </div>
</div>

<!-- KPI GRID -->
<div style="max-width:1200px;margin:0 auto;padding:20px 40px;">
  <div id="kpi-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;"></div>
</div>

<!-- MONTHLY HEATMAP -->
<div style="max-width:1200px;margin:0 auto;padding:48px 40px;">
  <h2 id="heat-title" style="font-family:'Sora',sans-serif;font-size:28px;font-weight:700;letter-spacing:-0.02em;margin:0 0 6px;"></h2>
  <p id="heat-sub" style="font-size:14.5px;color:#7c8aa3;margin:0 0 24px;"></p>
  <div id="heatmap" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;overflow-x:auto;"></div>
</div>

<!-- CTA -->
<div style="max-width:1200px;margin:0 auto;padding:10px 40px 90px;">
  <div style="border-radius:24px;border:1px solid rgba(61,220,151,.2);background:radial-gradient(120% 140% at 0% 0%,rgba(79,140,255,.16) 0%,rgba(61,220,151,.07) 45%,rgba(255,255,255,.02) 75%);padding:48px;text-align:center;">
    <h2 id="cta-title" style="font-family:'Sora',sans-serif;font-size:34px;font-weight:800;letter-spacing:-0.02em;margin:0 0 12px;"></h2>
    <p id="cta-sub" style="font-size:16.5px;color:#aeb9cc;max-width:480px;margin:0 auto 28px;line-height:1.6;"></p>
    <a href="prezzi.html" id="cta-btn" style="text-decoration:none;padding:15px 32px;background:linear-gradient(135deg,#4F8CFF,#3DDC97);color:#06101f;font-weight:600;font-size:15px;border-radius:30px;"></a>
  </div>
</div>

<div id="main-footer"></div>
</div>
<script src="shared.js"></script>
<script>
const it = getLang() === 'it';
initNav('performance');
renderFooter();

const G='#3DDC97', B='#4F8CFF', W='#EAF0F8';
function cell(v) {
  const a = Math.min(0.07 + Math.abs(v) / 32, 0.34);
  return { v:(v>=0?'+':'')+v.toFixed(1), bg:v>=0?`rgba(61,220,151,${a})`:`rgba(217,154,78,${a})`, c:v>=0?'#bfeddb':'#e6c79a' };
}
function buildRow(year, arr) {
  const sum = arr.reduce((s,x)=>s+x,0);
  return { year, cells:arr.map(cell), ytd:'+'+sum.toFixed(1)+'%' };
}
const rows = [
  buildRow(2023,[2.1,-1.2,3.4,1.8,-0.6,4.2,2.7,1.1,-1.8,3.9,2.2,1.6]),
  buildRow(2024,[3.1,2.4,-1.1,2.8,1.9,-0.4,3.6,2.1,1.4,-2.1,4.1,2.9]),
  buildRow(2025,[2.6,1.8,3.2,-0.9,2.4,1.7,2.9,-1.3,3.1,2.0,1.5,2.2]),
];
const months = it?['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic']:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

document.getElementById('h1').textContent = it?'Numeri trasparenti, aggiornati nel tempo.':'Transparent numbers, updated over time.';
document.getElementById('sub').textContent = it?'Curva di equity, drawdown e metriche di rischio dell\'intero track record. Tutti i valori in questa pagina sono illustrativi.':'Equity curve, drawdown and risk metrics for the full track record. All figures on this page are illustrative.';
document.getElementById('disclaimer').textContent = it?'Avviso: i dati mostrati sono illustrativi e a scopo dimostrativo. Non rappresentano un conto reale né garantiscono risultati futuri.':'Disclaimer: the data shown is illustrative and for demonstration purposes only. It does not represent a live account nor guarantee future results.';
document.getElementById('chart-title').textContent = it?'Curva di equity · 2023–2026':'Equity curve · 2023–2026';
document.getElementById('leg-net').textContent = it?'Crescita netta':'Net growth';
document.getElementById('heat-title').textContent = it?'Rendimenti mensili':'Monthly returns';
document.getElementById('heat-sub').textContent = it?'Percentuale di crescita per mese. Verde = positivo, ambra = negativo. Valori illustrativi.':'Growth percentage per month. Green = positive, amber = negative. Illustrative figures.';
document.getElementById('cta-title').textContent = it?'Questi numeri ti convincono?':'Convinced by these numbers?';
document.getElementById('cta-sub').textContent = it?'Attiva Nexus EA e segui la stessa strategia sul tuo conto.':'Activate Nexus EA and follow the same strategy on your account.';
document.getElementById('cta-btn').textContent = it?'Vedi i piani':'See the plans';

const kpis = it
  ? [{l:'RENDIMENTO TOTALE',v:'+187%',c:G},{l:'CAGR',v:'+42%',c:G},{l:'MAX DRAWDOWN',v:'8.4%',c:B},{l:'WIN RATE',v:'71%',c:W},{l:'PROFIT FACTOR',v:'2.31',c:G},{l:'SHARPE RATIO',v:'1.42',c:W},{l:'TRADE TOTALI',v:'1.840',c:W},{l:'RECOVERY FACTOR',v:'4.7',c:G}]
  : [{l:'TOTAL RETURN',v:'+187%',c:G},{l:'CAGR',v:'+42%',c:G},{l:'MAX DRAWDOWN',v:'8.4%',c:B},{l:'WIN RATE',v:'71%',c:W},{l:'PROFIT FACTOR',v:'2.31',c:G},{l:'SHARPE RATIO',v:'1.42',c:W},{l:'TOTAL TRADES',v:'1,840',c:W},{l:'RECOVERY FACTOR',v:'4.7',c:G}];
document.getElementById('kpi-grid').innerHTML = kpis.map(k=>`
  <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#5b6472;letter-spacing:.04em;">${k.l}</div>
    <div style="font-family:'Sora',sans-serif;font-size:26px;font-weight:700;margin-top:8px;color:${k.c};">${k.v}</div>
  </div>`).join('');

document.getElementById('heatmap').innerHTML = `
  <div style="min-width:840px;">
    <div style="display:grid;grid-template-columns:54px repeat(12,1fr) 64px;gap:5px;margin-bottom:5px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#5b6472;">
      <span></span>${months.map(m=>`<span style="text-align:center;">${m}</span>`).join('')}<span style="text-align:center;color:#3DDC97;">YTD</span>
    </div>
    ${rows.map(r=>`
      <div style="display:grid;grid-template-columns:54px repeat(12,1fr) 64px;gap:5px;margin-bottom:5px;">
        <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#9aa6b8;display:flex;align-items:center;">${r.year}</span>
        ${r.cells.map(c=>`<div style="text-align:center;padding:9px 2px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;background:${c.bg};color:${c.c};">${c.v}</div>`).join('')}
        <div style="text-align:center;padding:9px 2px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;background:rgba(61,220,151,.16);color:#3DDC97;">${r.ytd}</div>
      </div>`).join('')}
  </div>`;
</script>
</body>
</html>
