<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus EA — Prezzi</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;} html,body{margin:0;} ::selection{background:rgba(61,220,151,.3);}</style>
</head>
<body style="min-height:100vh;background:#080B11;font-family:'IBM Plex Sans',sans-serif;color:#EAF0F8;">
<div style="background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:48px 48px;">
<div id="main-nav"></div>
<div style="max-width:900px;margin:0 auto;padding:66px 40px 30px;text-align:center;">
  <div style="display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;color:#3DDC97;border:1px solid rgba(61,220,151,.3);padding:7px 14px;border-radius:30px;margin-bottom:24px;">// PREZZI</div>
  <h1 id="h1" style="font-family:'Sora',sans-serif;font-size:50px;line-height:1.06;font-weight:800;letter-spacing:-0.025em;margin:0 0 18px;"></h1>
  <p id="sub" style="font-size:18px;line-height:1.6;color:#9aa6b8;max-width:560px;margin:0 auto 30px;"></p>
</div>
<div style="max-width:1160px;margin:0 auto;padding:24px 40px 90px;">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;">
    <div id="plan-starter"></div>
    <div id="plan-pro"></div>
    <div id="plan-elite"></div>
  </div>
</div>
<div id="main-footer"></div>
</div>
<script src="shared.js"></script>
<script>
const it = getLang() === 'it';
initNav('prezzi'); renderFooter();
document.getElementById('h1').textContent = it?'Una licenza. Nessuna sorpresa.':'One licence. No surprises.';
document.getElementById('sub').textContent = it?'Scegli tra licenza a vita o abbonamento mensile. Tutti i piani includono la garanzia soddisfatti o rimborsati di 30 giorni.':'Choose between a lifetime licence or a monthly subscription. All plans include a 30-day money-back guarantee.';
const plans = [
  {id:'starter',name:'Starter',price:it?'€299':'€299',note:it?'Pagamento unico':'One-time',tagline:it?'Per provare la strategia su un singolo conto.':'To try the strategy on a single account.',features:it?['Licenza per 1 conto reale','Demo illimitate','Aggiornamenti per 12 mesi','Supporto via email']:['Licence for 1 live account','Unlimited demos','12 months of updates','Email support'],pop:false},
  {id:'pro',name:'Pro',price:it?'€499':'€499',note:it?'Pagamento unico':'One-time',tagline:it?'La scelta consigliata per la maggior parte dei trader.':'The recommended choice for most traders.',features:it?['Licenza per 1 conto reale','Demo illimitate','Aggiornamenti a vita','Supporto prioritario','Setup VPS guidato']:['Licence for 1 live account','Unlimited demos','Lifetime updates','Priority support','Guided VPS setup'],pop:true},
  {id:'elite',name:'Elite',price:it?'€899':'€899',note:it?'Pagamento unico':'One-time',tagline:it?'Per chi gestisce più conti e vuole il massimo.':'For those running multiple accounts who want it all.',features:it?['Licenza per 3 conti reali','Demo illimitate','Aggiornamenti a vita','Supporto 1:1','Sessioni di ottimizzazione']:['Licence for 3 live accounts','Unlimited demos','Lifetime updates','Priority 1:1 support','Optimisation sessions'],pop:false},
];
plans.forEach(p=>{
  document.getElementById('plan-'+p.id).innerHTML = `
    <div style="position:relative;display:flex;flex-direction:column;background:${p.pop?'rgba(61,220,151,.05)':'rgba(255,255,255,.03)'};border:1px solid ${p.pop?'rgba(61,220,151,.35)':'rgba(255,255,255,.08)'};border-radius:20px;padding:30px;">
      ${p.pop?`<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;background:linear-gradient(135deg,#4F8CFF,#3DDC97);color:#06101f;font-weight:600;padding:6px 14px;border-radius:30px;">${it?'PIÙ SCELTO':'MOST POPULAR'}</div>`:''}
      <div style="font-family:'Sora',sans-serif;font-weight:700;font-size:21px;margin-bottom:6px;">${p.name}</div>
      <div style="font-size:14px;color:#9aa6b8;min-height:40px;line-height:1.5;">${p.tagline}</div>
      <div style="font-family:'Sora',sans-serif;font-size:42px;font-weight:800;margin:18px 0 4px;">${p.price}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#3DDC97;margin-bottom:22px;">${p.note}</div>
      <a href="#" style="text-decoration:none;text-align:center;padding:14px;border-radius:30px;font-weight:600;font-size:15px;margin-bottom:24px;background:${p.pop?'linear-gradient(135deg,#4F8CFF,#3DDC97)':'rgba(255,255,255,.05)'};color:${p.pop?'#06101f':'#EAF0F8'};border:${p.pop?'none':'1px solid rgba(255,255,255,.16)'};">${it?'Acquista '+p.name:'Buy '+p.name}</a>
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${p.features.map(f=>`<div style="display:flex;align-items:flex-start;gap:10px;font-size:14px;color:#cdd6e4;"><span style="color:#3DDC97;font-size:13px;margin-top:2px;">✓</span><span>${f}</span></div>`).join('')}
      </div>
    </div>`;
});
</script>
</body>
</html>
