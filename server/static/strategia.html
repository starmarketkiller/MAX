<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus EA — Strategia</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;} html,body{margin:0;} ::selection{background:rgba(61,220,151,.3);}</style>
</head>
<body style="min-height:100vh;background:#080B11;font-family:'IBM Plex Sans',sans-serif;color:#EAF0F8;">
<div style="background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:48px 48px;">
<div id="main-nav"></div>
<div style="max-width:1000px;margin:0 auto;padding:74px 40px 50px;text-align:center;">
  <div style="display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;color:#4F8CFF;border:1px solid rgba(79,140,255,.3);padding:7px 14px;border-radius:30px;margin-bottom:26px;">// STRATEGIA</div>
  <h1 id="h1" style="font-family:'Sora',sans-serif;font-size:50px;line-height:1.07;font-weight:800;letter-spacing:-0.025em;margin:0 0 20px;"></h1>
  <p id="sub" style="font-size:18px;line-height:1.62;color:#9aa6b8;max-width:600px;margin:0 auto;"></p>
</div>
<div style="max-width:1200px;margin:0 auto;padding:30px 40px 90px;">
  <div id="pillars" style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:48px;"></div>
  <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:24px;border:1px solid rgba(61,220,151,.2);padding:48px;text-align:center;">
    <h2 id="cta-title" style="font-family:'Sora',sans-serif;font-size:32px;font-weight:800;letter-spacing:-0.02em;margin:0 0 12px;"></h2>
    <a href="prezzi.html" id="cta-btn" style="text-decoration:none;padding:15px 32px;background:linear-gradient(135deg,#4F8CFF,#3DDC97);color:#06101f;font-weight:600;font-size:15px;border-radius:30px;display:inline-block;margin-top:16px;"></a>
  </div>
</div>
<div id="main-footer"></div>
</div>
<script src="shared.js"></script>
<script>
const it = getLang() === 'it';
initNav('strategia'); renderFooter();
document.getElementById('h1').textContent = it?'Una strategia algoritmica trasparente, non una black box.':'A transparent algorithmic strategy, not a black box.';
document.getElementById('sub').textContent = it?'Nexus EA combina analisi di trend, mean-reversion e filtri di volatilità. Ogni componente ha una logica spiegabile e parametri configurabili.':'Nexus EA combines trend analysis, mean-reversion and volatility filters. Every component has an explainable logic and configurable parameters.';
document.getElementById('cta-title').textContent = it?'Pronto a iniziare?':'Ready to get started?';
document.getElementById('cta-btn').textContent = it?'Vedi i piani →':'See the plans →';
const pillars = it ? [
  {i:'◆',t:'Analisi di Trend',d:'Identifica la direzione del mercato su timeframe multipli usando medie mobili e momentum.'},
  {i:'◇',t:'Mean-Reversion',d:'Sfrutta i ritorni alla media in fase di consolidamento per operazioni ad alta probabilità.'},
  {i:'●',t:'Risk Management',d:'Stop-loss dinamico, dimensionamento automatico delle posizioni, limite di drawdown giornaliero.'},
  {i:'◈',t:'Filtri di Volatilità',d:'ATR e Bollinger Bands per evitare operazioni in mercati troppo piatti o troppo frenetici.'},
  {i:'◐',t:'Bias HTF',d:'Filtro obbligatorio sul timeframe alto per allinearsi con il trend dominante.'},
  {i:'✦',t:'Anti-Revenge',d:'Cooldown automatico dopo 2 perdite consecutive per proteggere il capitale.'},
] : [
  {i:'◆',t:'Trend Analysis',d:'Identifies market direction on multiple timeframes using moving averages and momentum.'},
  {i:'◇',t:'Mean-Reversion',d:'Exploits returns to the mean during consolidation for high-probability trades.'},
  {i:'●',t:'Risk Management',d:'Dynamic stop-loss, automatic position sizing, daily drawdown limit.'},
  {i:'◈',t:'Volatility Filters',d:'ATR and Bollinger Bands to avoid trades in overly flat or frantic markets.'},
  {i:'◐',t:'HTF Bias',d:'Mandatory higher timeframe filter to align with the dominant trend.'},
  {i:'✦',t:'Anti-Revenge',d:'Automatic cooldown after 2 consecutive losses to protect capital.'},
];
document.getElementById('pillars').innerHTML = pillars.map(p=>`
  <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;">
    <div style="font-size:22px;margin-bottom:12px;">${p.i}</div>
    <div style="font-family:'Sora',sans-serif;font-weight:600;font-size:17px;margin-bottom:8px;">${p.t}</div>
    <div style="font-size:14px;line-height:1.55;color:#9aa6b8;">${p.d}</div>
  </div>`).join('');
</script>
</body>
</html>
