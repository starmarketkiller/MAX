<style>

</style>
</head>

        <span style="color:#9aa6b8;">EQUITY · LIVE</span>
        <span style="color:#3DDC97;">● <span id="h-verified"></span>*</span>
      </div>
      <svg viewBox="0 0 600 220" style="width:100%;height:200px;display:block;">

          <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3DDC97" stop-opacity="0.32"/><stop offset="1" stop-color="#3DDC97" stop-opacity="0"/></linearGradient>

        <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;"><div id="k-mesi" style="font-size:11px;color:#5b6472;"></div><div style="font-size:21px;margin-top:4px;">36</div></div>
        <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;"><div id="k-leva" style="font-size:11px;color:#5b6472;"></div><div style="font-size:21px;margin-top:4px;">1:30</div></div>

      <h2 id="cta-title" style="font-family:'Sora',sans-serif;font-size:42px;font-weight:800;letter-spacing:-0.025em;margin:0 0 16px;"></h2>
      <p id="cta-sub" style="font-size:17px;color:#aeb9cc;max-width:520px;margin:0 auto 32px;line-height:1.6;"></p>
      <div style="display:flex;gap:14px;justify-content:center;margin-bottom:18px;">

      </div>
      <div id="cta-note" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#7c8aa3;"></div>
    </div>
  </div>

  <div id="main-footer"></div>
</div>
<script src="shared.js"></script>
