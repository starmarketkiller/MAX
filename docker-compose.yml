version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: licensing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server-api:
    build: ./server-api
    depends_on:
      - postgres
    env_file:
      - ./server-api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/licensing?schema=public
    ports:
      - "8080:8080"
    volumes:
      - ./webapp:/webapp:ro

  telegram-bot:
    build: ./telegram-bot
    depends_on:
      - server-api
    env_file:
      - ./server-api/.env
    environment:
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:8080/webapp}
      BOT_ENV_FILE: /app/../server-api/.env

volumes:
  pgdata:
